# Keep the SHA-pinned GitHub Actions and pip deps current, so pins do not silently rot and new
# CVEs surface. The workflows pin every `uses:` to a commit SHA (with a `# vX` comment) to close
# the mutable-tag supply-chain risk (tj-actions/changed-files class); Dependabot bumps the SHA and
# the comment together. pip covers requirements*.txt at the repo root.
version: 2
updates:
  - package-ecosystem: github-actions
    directory: "/"
    schedule: { interval: weekly }
    commit-message: { prefix: "chore(ci)" }
    groups:
      actions: { patterns: ["*"] }
  - package-ecosystem: pip
    directory: "/"
    schedule: { interval: weekly }
    commit-message: { prefix: "chore(deps)" }
  # the FastAPI api image: its Dockerfile FROM (now digest-pinned) + its own requirements.txt
  # (the root pip entry above does not recurse into app/api/).
  - package-ecosystem: docker
    directory: "/app/api"
    schedule: { interval: weekly }
    commit-message: { prefix: "chore(deps)" }
  - package-ecosystem: pip
    directory: "/app/api"
    schedule: { interval: weekly }
    commit-message: { prefix: "chore(deps)" }
  # NOTE: openfga/* and cgr.dev/chainguard/* images used via `docker run` / k8s manifests are
  # digest-pinned in place (was `:latest`) but are NOT Dockerfile FROMs, so Dependabot cannot
  # track them — refresh those digests manually when bumping.
