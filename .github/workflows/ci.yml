name: ci

on:
  push:
    branches: [main, master]
  pull_request:

permissions:
  contents: read

jobs:
  # Fast, deterministic policy gate — the real shift-left checks.
  policy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with: { python-version: "3.12" }
      - run: pip install -r requirements-dev.txt

      - name: Cedar authz unit tests (schema validate + 7 scenarios)
        run: python cedar/authz.py

      - name: Checkov (Terraform + K8s workloads)
        run: checkov -d terraform -d k8s --config-file .checkov.yaml --compact

      - uses: hashicorp/setup-terraform@v3
        with: { terraform_version: "1.14.0" }
      - name: Terraform fmt + validate
        working-directory: terraform
        run: |
          terraform fmt -check -recursive
          terraform init -backend=false -input=false
          terraform validate -no-color

      - name: Secret scan (gitleaks)
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # Stand up kind + Cilium and prove enforcement end to end (the real demo, in CI).
  integration:
    runs-on: ubuntu-latest
    needs: policy
    steps:
      - uses: actions/checkout@v4

      - name: Build the Cedar PDP api image
        run: docker build -t cloudsec-api:local -f app/api/Dockerfile .

      - name: Create kind cluster (default CNI disabled)
        uses: helm/kind-action@v1.10.0
        with:
          cluster_name: cloudsec
          config: .github/kind-config.yaml

      - name: Install Cilium (with L7 proxy)
        run: |
          curl -sL https://github.com/cilium/cilium-cli/releases/latest/download/cilium-linux-amd64.tar.gz | sudo tar xzC /usr/local/bin
          cilium install --version 1.16.5 --set l7Proxy=true --wait

      - name: Load image + deploy app and policies
        run: |
          kind load docker-image cloudsec-api:local --name cloudsec
          kubectl apply -f k8s/app.yaml -f k8s/netpol.yaml
          kubectl -n shop rollout status deploy/web --timeout=180s
          kubectl -n shop rollout status deploy/api --timeout=180s
          kubectl -n shop rollout status deploy/db  --timeout=180s

      - name: Verify enforcement (L3 + L7 + Cedar + egress)
        run: bash scripts/verify.sh
