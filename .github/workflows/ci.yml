name: ci

on:
  push:
    branches: [main, master]
  pull_request:

permissions:
  contents: read

jobs:
  # Fast, deterministic policy gate — the real shift-left checks.
  policy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
        with: { fetch-depth: 0 }   # gitleaks scans the push commit range; needs full history

      - uses: actions/setup-python@v6
        with: { python-version: "3.12" }
      - run: pip install -r requirements-dev.txt

      - name: Cedar authz unit tests (schema validate + 8 scenarios)
        run: python cedar/authz.py

      - name: Cedar AI-agent delegation tests (confused-deputy / intersection)
        run: python cedar/agent_authz.py

      - name: PDP Bearer-JWT audience binding (RFC 8707 fail-closed)
        run: python app/api/auth_test.py

      - name: Cross-layer policy consistency (Cilium L7 x Cedar; z3 finite-domain check)
        run: python formal/cross_layer.py

      - name: Cross-layer emitters/classifier unit tests (ungated branch, SARIF/JSON shape, HTML escaping)
        run: python formal/cross_layer_test.py

      # Render the lint as downloadable JSON/SARIF/HTML on EVERY run (even when the
      # gate above fails on an UNGATED path — that is exactly when you want the SARIF).
      # Artifacts work on private+free repos. To surface findings in the GitHub
      # "Security ▸ Code scanning" UI instead, the repo must be public or have GHAS;
      # then swap the upload below for github/codeql-action/upload-sarif (+ permissions:
      # security-events: write) pointing at outputs/cross-layer/report.sarif.
      - name: Cross-layer report (JSON/SARIF/HTML)
        if: always()
        run: python formal/cross_layer.py --out outputs/cross-layer || true
      - name: Upload cross-layer-lint report
        if: always()
        uses: actions/upload-artifact@v6
        with:
          name: cross-layer-report
          path: outputs/cross-layer/

      - name: "Identity tier-SA consistency (no drift: rbac <-> 3 admission policies)"
        run: python scripts/check-sa-consistency.py

      - name: ReBAC model test (OpenFGA — relationship-derived allow/deny)
        run: docker run --rm -v "${{ github.workspace }}/rebac:/data" openfga/cli:latest model test --tests /data/store.fga.yaml

      - name: Checkov (Terraform + K8s workloads)
        run: checkov -d terraform -d k8s --config-file .checkov.yaml --compact

      - uses: hashicorp/setup-terraform@v4
        with: { terraform_version: "1.14.0" }
      - name: Terraform fmt + validate
        working-directory: terraform
        run: |
          terraform fmt -check -recursive
          terraform init -backend=false -input=false
          terraform validate -no-color

      - name: Secret scan (gitleaks)
        uses: gitleaks/gitleaks-action@v3
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # Stand up kind + Cilium and prove enforcement end to end (the real demo, in CI).
  integration:
    runs-on: ubuntu-latest
    needs: policy
    steps:
      - uses: actions/checkout@v5

      - name: Build the Cedar PDP api image
        run: docker build -t cloudsec-api:local -f app/api/Dockerfile .

      # Build provenance: vuln+secret gate + SBOM on the freshly built image.
      # cosign SIGNING is NOT here — the local image has no registry (see
      # docs/aws-eks-path.md). Official install script (no version guesswork),
      # mirroring how cilium-cli is installed below.
      - name: Trivy image vuln+secret gate + CycloneDX SBOM
        run: |
          # pinned: install.sh + trivy both from the v0.71.1 tag (no moving main/latest)
          curl -sfL https://raw.githubusercontent.com/aquasecurity/trivy/v0.71.1/contrib/install.sh | sudo sh -s -- -b /usr/local/bin v0.71.1
          trivy image --scanners vuln,secret --severity CRITICAL,HIGH --ignore-unfixed --exit-code 1 cloudsec-api:local
          mkdir -p outputs/sbom
          trivy image --quiet --format cyclonedx --output outputs/sbom/cloudsec-api.cdx.json cloudsec-api:local
          test "$(jq '.components | length' outputs/sbom/cloudsec-api.cdx.json)" -gt 0

      - name: Create kind cluster (default CNI disabled)
        uses: helm/kind-action@v1.14.0
        with:
          # kind BINARY must match the kindest/node:v1.34.0 images in kind-config.yaml,
          # or `kind load docker-image` fails with "failed to detect containerd
          # snapshotter". v0.30.0 ships the v1.34 node image.
          version: v0.30.0
          cluster_name: cloudsec
          config: .github/kind-config.yaml

      - name: Install Cilium (L7 + mutual auth + WireGuard) + Tetragon (runtime)
        run: |
          # pinned cilium-cli + sha256 verification (was: releases/latest, a moving target)
          CILIUM_CLI_VERSION=v0.19.4
          base="https://github.com/cilium/cilium-cli/releases/download/${CILIUM_CLI_VERSION}"
          curl -sSL --fail -o cilium.tar.gz "${base}/cilium-linux-amd64.tar.gz"
          curl -sSL --fail -o cilium.tar.gz.sha256sum "${base}/cilium-linux-amd64.tar.gz.sha256sum"
          sed 's/cilium-linux-amd64.tar.gz/cilium.tar.gz/' cilium.tar.gz.sha256sum | sha256sum --check
          sudo tar xzC /usr/local/bin -f cilium.tar.gz
          rm -f cilium.tar.gz cilium.tar.gz.sha256sum
          cilium install --version 1.16.5 \
            --set l7Proxy=true \
            --set encryption.enabled=true --set encryption.type=wireguard \
            --set authentication.mutual.spire.enabled=true \
            --set authentication.mutual.spire.install.enabled=true \
            --wait
          helm repo add cilium https://helm.cilium.io/ && helm repo update cilium
          helm install tetragon cilium/tetragon -n kube-system --version 1.7.0 --wait

      - name: Load image + deploy identity, app, network + runtime policies
        run: |
          kind load docker-image cloudsec-api:local --name cloudsec
          # Identity FIRST: the tier ServiceAccounts (rbac.yaml) must exist before
          # app.yaml's Deployments reference them, or the ServiceAccount admission
          # controller rejects the pods. admission-policy.yaml is the B7 control.
          kubectl apply -f k8s/rbac.yaml -f k8s/admission-policy.yaml -f k8s/admission-sa-use.yaml
          kubectl apply -f k8s/app.yaml -f k8s/netpol.yaml -f k8s/tracingpolicy.yaml
          kubectl -n shop rollout status deploy/web --timeout=180s
          kubectl -n shop rollout status deploy/api --timeout=180s
          kubectl -n shop rollout status deploy/db  --timeout=180s

      - name: Verify enforcement (identity + L3 + L7 + Cedar + egress + runtime + encryption)
        run: bash scripts/verify.sh
      # verify.sh emits a JUnit report (outputs/verify/junit.xml); keep it on pass AND fail.
      # To surface per-check results inline in the run UI, feed this to a JUnit test-reporter.
      - name: Upload verify.sh JUnit report
        if: always()
        uses: actions/upload-artifact@v6
        with:
          name: verify-junit
          path: outputs/verify/junit.xml
          if-no-files-found: warn
      # M9 assume-breach lens: same proven probes, framed as attacker post-exploit
      # containment. Asserts every blast-radius boundary HELD on the live stack.
      - name: M9 assume-breach containment (blast-radius boundaries hold)
        run: bash labs/m9/grade.sh
