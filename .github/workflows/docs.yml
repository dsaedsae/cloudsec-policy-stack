name: docs

# Build the MkDocs site (catches broken nav/links) on every push, AND deploy it to
# GitHub Pages on push to master. The repo went public 2026-06-24, so Pages on the free
# plan now serves it. Pages source must be "GitHub Actions" (enabled once via the API or
# Settings -> Pages -> Build and deployment -> Source: GitHub Actions).
on:
  push:
    branches: [main, master]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read
  pages: write          # publish to GitHub Pages
  id-token: write       # OIDC token consumed by deploy-pages

# Serialize Pages publishes; never cancel an in-progress deploy.
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6
        with: { python-version: "3.12" }
      - run: pip install -r requirements-docs.txt
      - run: python -m mkdocs build --strict
        env:
          NO_MKDOCS_2_WARNING: "true"       # Material dependency ships TWO promo banners,
          DISABLE_MKDOCS_2_WARNING: "true"  # one gated by each var; both needed. Build is green either way.
      - uses: actions/upload-pages-artifact@fc324d3547104276b827a68afc52ff2a11cc49c9 # v5.0.0
        with:
          path: site                        # mkdocs site_dir (default artifact path is _site)

  # Publish to GitHub Pages — only on a real push to master (skips PRs and the main mirror).
  deploy:
    if: github.event_name == 'push' && github.ref == 'refs/heads/master'
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@cd2ce8fcbc39b97be8ca5fce6e763baed58fa128 # v5.0.0
