name: docs

# Build the MkDocs site as a check (catches broken nav/links/build) on every push.
# Deploy is intentionally NOT here: the repo is private and GitHub Pages on the free
# plan only serves public repos. To publish later: make the repo public, then add a
# deploy job (upload-pages-artifact + deploy-pages) and enable Pages (Source: Actions).
on:
  push:
    branches: [main, master]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: { python-version: "3.12" }
      - run: pip install -r requirements-docs.txt
      - run: python -m mkdocs build --strict
        env:
          NO_MKDOCS_2_WARNING: "true"   # suppress the Material dependency's promo banner (build is green either way)
