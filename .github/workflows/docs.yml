name: docs

# Build the MkDocs site as a check (catches broken nav/links/build) on every push.
# Deploy is intentionally NOT here: the repo is private and GitHub Pages on the free
# plan only serves public repos. To publish later: make the repo public, then add a
# deploy job (upload-pages-artifact + deploy-pages) and enable Pages (Source: Actions).
on:
  push:
    branches: [main, master]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6
        with: { python-version: "3.12" }
      - run: pip install -r requirements-docs.txt
      - run: python -m mkdocs build --strict
        env:
          NO_MKDOCS_2_WARNING: "true"       # Material dependency ships TWO promo banners,
          DISABLE_MKDOCS_2_WARNING: "true"  # one gated by each var; both needed. Build is green either way.
