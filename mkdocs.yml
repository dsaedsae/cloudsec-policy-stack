site_name: cloudsec-policy-stack
site_description: 망분리 완화(MLS) 보상통제를 코드로 — 검증 가능한 방어심층(defense-in-depth)
site_author: dsaedsae
repo_url: https://github.com/dsaedsae/cloudsec-policy-stack
repo_name: dsaedsae/cloudsec-policy-stack
edit_uri: edit/main/

# The repo isn't a docs/-only project — Markdown lives at the root and across
# docs/ runbooks/ presentation/. The same-dir plugin lets docs_dir be the repo
# root (MkDocs 1.6 otherwise forbids it); exclude the code/infra dirs from the build.
plugins:
  - search
  - same-dir
docs_dir: .
site_dir: site

# NOTE: do NOT add docs/stylesheets or docs/assets to exclude_docs — that would drop
# the logo/CSS from the build.
extra_css:
  - docs/stylesheets/extra.css

copyright: 이 사이트는 워크로드 보상통제 학습 레퍼런스입니다 — 인증·제품·법률자문이 아닙니다. · dsaedsae

exclude_docs: |
  /README.md
  .venv/
  .git/
  .github/
  terraform/
  scripts/
  app/
  cedar/
  rebac/
  outputs/
  k8s/
  node_modules/
  site/
  *.tf
  *.tfvars
  requirements*.txt
  .checkov.yaml
  .gitattributes
  .gitignore

theme:
  name: material
  language: ko
  logo: docs/assets/logo.svg        # outline shield+check (verifiability motif)
  favicon: docs/assets/favicon.svg
  font:
    text: Noto Sans KR              # Korean readability (no tofu), English control names
    code: JetBrains Mono            # 0/O distinction for commands/policies
  palette:
    - scheme: default
      primary: indigo
      accent: teal                  # the one semantic accent = "a test proved this"
      toggle: { icon: material/weather-night, name: 다크 모드로 }
    - scheme: slate
      primary: indigo
      accent: teal
      toggle: { icon: material/weather-sunny, name: 라이트 모드로 }
  features:
    - navigation.tabs               # top-level tabs (learner-first IA)
    - navigation.tabs.sticky
    - navigation.top
    - navigation.path               # breadcrumbs
    - navigation.indexes
    - navigation.tracking
    - navigation.footer             # auto prev/next (M0→M6 sequence)
    - content.code.copy
    - content.code.annotate         # inline code teaching in labs
    - search.highlight
    - search.suggest
    - toc.follow

markdown_extensions:
  - admonition
  - attr_list
  - md_in_html
  - tables
  - footnotes
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg
  - pymdownx.details
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - pymdownx.highlight: { anchor_linenums: true }
  - pymdownx.inlinehilite
  - pymdownx.tabbed: { alternate_style: true }
  - toc: { permalink: true }

# The .md files use GitHub-relative links between each other; don't fail the build
# on those (the nav below is the canonical navigation).
validation:
  nav: { omitted_files: ignore }
  links: { not_found: warn, absolute_links: ignore, unrecognized_links: ignore }

# 5 learner-intent tabs (navigation.tabs). Each section's first bare entry is its
# clickable landing page (navigation.indexes).
nav:
  - 시작하기: index.md
  - 재구현 트랙:
    - labs/README.md
    - 환경 준비 (Windows): labs/SETUP.md
    - 교육용으로 쓰기 (instructor): docs/using-for-training.md
    - M0 · Cedar 인가 재구현: labs/m0/README.md
    - M1 · 쉬프트레프트 결함 사냥: labs/m1/README.md
    - M2 · 신원 admission CEL: labs/m2/README.md
    - M3 · Cilium 네트워크 정책: labs/m3/README.md
    - M4 · Tetragon 런타임: labs/m4/README.md
    - M5 · 암호화 실행·해석: labs/m5/README.md
    - M6 · 에이전트 위임 (ABAC+ReBAC): labs/m6/README.md
    - M7 · 교차계층 일관성 (formal): formal/README.md
    - M8 · 런타임 kill 경계 (detection≠prevention): labs/m8/README.md
    - 캡스톤 · 면접 노트: labs/capstone.md
  - 레퍼런스:
    - 위협 모델 (B1–B7): THREAT_MODEL.md
    - 인가 모델 (RBAC+ABAC/PaC/ReBAC): docs/authorization-model.md
    - NHI 생애주기 (워크로드 신원): docs/nhi.md
    - 금융 망분리 완화 (MLS): docs/financial-mls-mapping.md
    - 읽으며 따라가기 (개념 랩):
      - docs/README.md
      - 0 · 인가 as-code: docs/01-authz-no-cluster.md
      - 1 · 시프트레프트 스캔: docs/02-scan.md
      - 2 · 네트워크 + 인가: docs/03-network-and-authz.md
      - 3 · 런타임 (eBPF): docs/04-runtime.md
      - 4 · 신원 (B7): docs/05-identity.md
      - 5 · 데이터 보호: docs/06-data-protection.md
  - 운영 런북:
    - runbooks/README.md
    - 00 · 랩 클러스터 세션: runbooks/00-lab-cluster-session.md
    - 01 · 사고대응: runbooks/01-incident-response.md
    - 02 · 키 회전: runbooks/02-key-rotation.md
    - 03 · 브레이크글래스: runbooks/03-break-glass.md
    - 04 · 티어 온보딩: runbooks/04-tier-onboarding.md
    - 05 · 배포·롤백: runbooks/05-deploy-rollback.md
    - 06 · AWS teardown: runbooks/06-aws-teardown.md
  - 평가·발표:
    - 검증가능성 커버리지: docs/evaluation-coverage.md
    - 감사증거 패키지 (예시): docs/audit-evidence.md
    - 클라우드 + 비용 (무료부터): docs/aws-eks-path.md
    - 발표 아웃라인: presentation/talk-outline.md
