# Layer 0 (identity): least-privilege ServiceAccounts + who-may-deploy RBAC.
#
# Why this file exists: Cilium derives a workload's network identity from its
# POD LABELS (app: web|api|db). So "traffic from app:web may reach api" is only
# as trustworthy as "who can create a pod labeled app:web". That authority lives
# in the Kubernetes API (RBAC) — it is the identity TCB (see THREAT_MODEL.md, B7).
#
# Two controls here:
#   1. Each tier gets its own SA with ZERO RoleBindings -> zero API rights, so a
#      popped pod cannot touch the cluster API (defense in depth on top of the
#      unmounted token). Prove it:
#        kubectl auth can-i --list --as=system:serviceaccount:shop:api-sa
#   2. An example least-privilege "deployer" Role: may manage Deployments/Services
#      but NOT create bare pods and NOT touch ServiceAccounts. This SHRINKS the
#      blast radius (no secrets, no SA edits) — but be honest: a Deployment
#      template still carries `labels` and `serviceAccountName`, and modern k8s has
#      no `serviceaccounts/use` gate (PSP was removed in 1.25). So whoever holds
#      this Role can still mint a self-consistent forged `api` via a Deployment.
#      The forgery is constrained by trust in the deployer + closed cryptographically
#      by mutual auth (k8s/netpol-mutual.yaml), NOT by these verb omissions alone.

# The namespace lives HERE (the identity layer), not in app.yaml, because rbac.yaml
# is applied first: a ServiceAccount cannot be created in a namespace that does not
# exist yet. Pod Security Admission `restricted` is enforced from the start.
apiVersion: v1
kind: Namespace
metadata:
  name: shop
  labels:
    pod-security.kubernetes.io/enforce: restricted
---
apiVersion: v1
kind: ServiceAccount
metadata: { name: web-sa, namespace: shop }
automountServiceAccountToken: false
---
apiVersion: v1
kind: ServiceAccount
metadata: { name: api-sa, namespace: shop }
automountServiceAccountToken: false
---
apiVersion: v1
kind: ServiceAccount
metadata: { name: db-sa, namespace: shop }
automountServiceAccountToken: false
---
# Least-privilege role for whoever deploys the app (CI, an operator). Explicit
# verbs, namespaced, no wildcards. Note what is ABSENT: no `pods` create (you
# deploy via Deployments), no `serviceaccounts`, no `secrets`. This minimizes the
# deployer's reach — but it does NOT by itself close B7: a Deployment template can
# still set tier labels + serviceAccountName, so this principal remains trusted not
# to forge identity. See THREAT_MODEL.md (mitigation #2/#3) for the honest residual.
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata: { name: shop-deployer, namespace: shop }
rules:
  - apiGroups: ["apps"]
    resources: ["deployments"]
    verbs: ["get", "list", "watch", "create", "update", "patch"]
  - apiGroups: [""]
    resources: ["services", "configmaps"]
    verbs: ["get", "list", "watch", "create", "update", "patch"]
  - apiGroups: ["cilium.io"]
    resources: ["ciliumnetworkpolicies"]
    verbs: ["get", "list", "watch", "create", "update", "patch"]
---
# Bind it to a placeholder group; a real cluster maps this to a CI identity or an
# OIDC group. RoleBinding (namespaced), never a ClusterRoleBinding for app deploy.
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata: { name: shop-deployer-binding, namespace: shop }
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: shop-deployer
subjects:
  - kind: Group
    name: "shop:deployers"        # map to your CI SA / OIDC group in a real cluster
    apiGroup: rbac.authorization.k8s.io
