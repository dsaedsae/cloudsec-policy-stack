# Demo 3-tier app: web -> api -> db. Every workload is hardened (non-root,
# no privilege escalation, all caps dropped, read-only rootfs, seccomp, limits)
# so the checkov gate (scripts/scan.ps1) passes — "secure by default" workloads.
# The `shop` namespace (with PSA `restricted`) is created by k8s/rbac.yaml, which
# is applied BEFORE this file, so the tier ServiceAccounts exist when these
# Deployments reference them.
apiVersion: apps/v1
kind: Deployment
metadata:
  name: web
  namespace: shop
  labels: { app: web, tier: frontend }
spec:
  replicas: 1
  selector: { matchLabels: { app: web } }
  template:
    metadata:
      labels: { app: web, tier: frontend }
    spec:
      serviceAccountName: web-sa
      automountServiceAccountToken: false
      securityContext:
        runAsNonRoot: true
        runAsUser: 101
        seccompProfile: { type: RuntimeDefault }
      containers:
        - name: web
          image: nginxinc/nginx-unprivileged:1.27-alpine@sha256:65e3e85dbaed8ba248841d9d58a899b6197106c23cb0ff1a132b7bfe0547e4c0
          ports: [{ containerPort: 8080 }]
          imagePullPolicy: IfNotPresent
          readinessProbe: { httpGet: { path: /, port: 8080 }, initialDelaySeconds: 3, periodSeconds: 10 }
          livenessProbe: { httpGet: { path: /, port: 8080 }, initialDelaySeconds: 5, periodSeconds: 20 }
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities: { drop: ["ALL"] }
          resources:
            requests: { cpu: "10m", memory: "16Mi" }
            limits: { cpu: "100m", memory: "64Mi" }
          volumeMounts:
            - { name: tmp, mountPath: /tmp }
            - { name: cache, mountPath: /var/cache/nginx }
            - { name: run, mountPath: /var/run }
      volumes:
        - { name: tmp, emptyDir: {} }
        - { name: cache, emptyDir: {} }
        - { name: run, emptyDir: {} }
---
apiVersion: v1
kind: Service
metadata: { name: web, namespace: shop }
spec:
  selector: { app: web }
  ports: [{ port: 80, targetPort: 8080 }]
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: api
  namespace: shop
  labels: { app: api, tier: backend }
  annotations:
    # The api image is built locally from app/api/ and side-loaded into kind
    # (`kind load`); it has no registry @sha256 digest to pin. web/db/probe images
    # ARE digest-pinned. Scoped skip (not a global one) so every OTHER workload is
    # still held to digest pinning by CKV_K8S_43.
    checkov.io/skip1: CKV_K8S_43=locally-built image (cloudsec-api:local), loaded via `kind load`; no registry digest exists
spec:
  replicas: 1
  selector: { matchLabels: { app: api } }
  template:
    metadata:
      labels: { app: api, tier: backend }
    spec:
      serviceAccountName: api-sa
      automountServiceAccountToken: false
      securityContext:
        runAsNonRoot: true
        runAsUser: 10001
        seccompProfile: { type: RuntimeDefault }
      containers:
        - name: api
          image: cloudsec-api:local   # FastAPI Cedar PDP (built from app/api/)
          ports: [{ containerPort: 8080 }]
          imagePullPolicy: IfNotPresent
          readinessProbe: { httpGet: { path: /healthz, port: 8080 }, initialDelaySeconds: 3, periodSeconds: 10 }
          livenessProbe: { httpGet: { path: /healthz, port: 8080 }, initialDelaySeconds: 5, periodSeconds: 20 }
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities: { drop: ["ALL"] }
          resources:
            requests: { cpu: "10m", memory: "16Mi" }
            limits: { cpu: "100m", memory: "64Mi" }
---
apiVersion: v1
kind: Service
metadata: { name: api, namespace: shop }
spec:
  selector: { app: api }
  ports: [{ port: 80, targetPort: 8080 }]
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: db
  namespace: shop
  labels: { app: db, tier: data }
spec:
  replicas: 1
  selector: { matchLabels: { app: db } }
  template:
    metadata:
      labels: { app: db, tier: data }
    spec:
      serviceAccountName: db-sa
      automountServiceAccountToken: false
      securityContext:
        runAsNonRoot: true
        runAsUser: 101
        seccompProfile: { type: RuntimeDefault }
      containers:
        - name: db
          image: nginxinc/nginx-unprivileged:1.27-alpine@sha256:65e3e85dbaed8ba248841d9d58a899b6197106c23cb0ff1a132b7bfe0547e4c0  # stands in for a backend datastore
          ports: [{ containerPort: 8080 }]
          imagePullPolicy: IfNotPresent
          readinessProbe: { httpGet: { path: /, port: 8080 }, initialDelaySeconds: 3, periodSeconds: 10 }
          livenessProbe: { httpGet: { path: /, port: 8080 }, initialDelaySeconds: 5, periodSeconds: 20 }
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities: { drop: ["ALL"] }
          resources:
            requests: { cpu: "10m", memory: "16Mi" }
            limits: { cpu: "100m", memory: "64Mi" }
          volumeMounts:
            - { name: tmp, mountPath: /tmp }
            - { name: cache, mountPath: /var/cache/nginx }
            - { name: run, mountPath: /var/run }
      volumes:
        - { name: tmp, emptyDir: {} }
        - { name: cache, emptyDir: {} }
        - { name: run, emptyDir: {} }
---
apiVersion: v1
kind: Service
metadata: { name: db, namespace: shop }
spec:
  selector: { app: db }
  ports: [{ port: 80, targetPort: 8080 }]
