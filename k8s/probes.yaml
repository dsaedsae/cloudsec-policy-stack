# Test clients for verify.ps1. Labeled with the identity under test (app=web /
# app=api) so Cilium applies the right policy. Hardened so they pass the
# namespace's `restricted` Pod Security admission (bare `kubectl run` would be
# rejected — which is the point: the namespace is locked down).
apiVersion: v1
kind: Pod
metadata:
  name: probe-web
  namespace: shop
  labels: { app: web, role: probe }
  annotations:
    checkov.io/skip1: CKV_K8S_8=ephemeral curl test client (sleep); nothing to liveness-probe
    checkov.io/skip2: CKV_K8S_9=ephemeral curl test client (sleep); nothing to readiness-probe
spec:
  serviceAccountName: web-sa        # match the app:web identity (admission policy)
  automountServiceAccountToken: false
  securityContext: { runAsNonRoot: true, runAsUser: 100, seccompProfile: { type: RuntimeDefault } }
  containers:
    - name: c
      image: curlimages/curl:8.11.1@sha256:c1fe1679c34d9784c1b0d1e5f62ac0a79fca01fb6377cdd33e90473c6f9f9a69
      command: ["sleep", "3600"]
      securityContext:
        allowPrivilegeEscalation: false
        readOnlyRootFilesystem: true
        capabilities: { drop: ["ALL"] }
      resources: { requests: { cpu: "5m", memory: "8Mi" }, limits: { cpu: "50m", memory: "32Mi" } }
---
apiVersion: v1
kind: Pod
metadata:
  name: probe-api
  namespace: shop
  labels: { app: api, role: probe }
  annotations:
    checkov.io/skip1: CKV_K8S_8=ephemeral curl test client (sleep); nothing to liveness-probe
    checkov.io/skip2: CKV_K8S_9=ephemeral curl test client (sleep); nothing to readiness-probe
spec:
  serviceAccountName: api-sa        # match the app:api identity (admission policy)
  automountServiceAccountToken: false
  securityContext: { runAsNonRoot: true, runAsUser: 100, seccompProfile: { type: RuntimeDefault } }
  containers:
    - name: c
      image: curlimages/curl:8.11.1@sha256:c1fe1679c34d9784c1b0d1e5f62ac0a79fca01fb6377cdd33e90473c6f9f9a69
      command: ["sleep", "3600"]
      securityContext:
        allowPrivilegeEscalation: false
        readOnlyRootFilesystem: true
        capabilities: { drop: ["ALL"] }
      resources: { requests: { cpu: "5m", memory: "8Mi" }, limits: { cpu: "50m", memory: "32Mi" } }
