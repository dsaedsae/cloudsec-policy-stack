# Layer 0 (identity), capstone: upgrade the web->api edge to REQUIRE mutual
# authentication (SPIFFE). This is the cryptographic closer for B7.
#
# Why this exists: the label<->SA admission policy (k8s/admission-policy.yaml)
# only forces a pod's `app` label and its ServiceAccount to AGREE. It cannot stop
# a principal who can create a workload from choosing BOTH consistently — a
# self-consistent forged `api` (label app:api + serviceAccountName api-sa) passes
# admission and IS `api` to Cilium, because Cilium derives identity from labels.
# (THREAT_MODEL.md B7 residual.)
#
# Mutual auth adds cryptographic identity-pair attestation to this edge: Cilium's
# SPIRE issues each workload an SVID keyed to its LABEL-DERIVED Cilium security
# identity (spiffe://spiffe.cilium/identity/<id>, selector cilium:mutual-auth),
# fetched by the cilium-agent via delegated identity; `mode: required` drops traffic
# on this edge until the agent-to-agent mTLS handshake completes.
# HONEST LIMIT: this defeats a LABEL-ONLY forge (which the label<->SA VAP already
# largely did), but does NOT close a SELF-CONSISTENT forge (app:api + api-sa) — that
# pod resolves to the SAME Cilium identity, is issued the SAME api SVID, and passes
# the handshake (the SA is one identity-relevant label, NOT an independent secret the
# forger lacks). The self-consistent forge is closed by the SA-USE gate
# (admission-sa-use.yaml / ID2 — who may RUN AS api-sa), not by this handshake.
# (1.16.5 agent-to-agent model: per {local_id,remote_id,node}, ~30-min expiry, keys
# discarded; data confidentiality is separate WireGuard.)
#
# This re-declares the SAME-named policy as k8s/netpol.yaml (allow-web-to-api) so
# `kubectl apply -f k8s/netpol-mutual.yaml` UPGRADES that edge in place (rather
# than adding a second, weaker allow-rule beside it). Apply it after netpol.yaml.
apiVersion: cilium.io/v2
kind: CiliumNetworkPolicy
metadata: { name: allow-web-to-api, namespace: shop }
spec:
  endpointSelector: { matchLabels: { app: api } }
  ingress:
    - fromEndpoints: [{ matchLabels: { app: web } }]
      # The SVID handshake is required before any traffic on this edge is allowed.
      authentication:
        mode: "required"
      toPorts:
        - ports: [{ port: "8080", protocol: TCP }]
          rules:
            http:
              - method: "GET"
                path: "/accounts/[^/]+$"
              - method: "POST"
                path: "/accounts/[^/]+/transfer$"
