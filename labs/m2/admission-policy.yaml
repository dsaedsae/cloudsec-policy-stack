# M2 작업 파일 — 라벨↔SA 일관성 admission 정책 (ValidatingAdmissionPolicy). 여기에만 작성한다.
#
# 스펙: app 라벨이 web|api|db 인 파드는 *반드시* 그에 맞는 SA(web-sa|api-sa|db-sa)로 떠야 한다.
#       app 라벨이 없는 파드(시스템/프로브)는 범위 밖(통과). 그 외 app 값은 알 수 없는 신원 → 거부.
# 채점: bash labs/m2/grade.sh   (클러스터 필요 — up 먼저)
# 정답지 k8s/admission-policy.yaml 은 졸업 전 열람 금지.
#
# 구조(matchConstraints/variables/binding)는 채워뒀다. 네가 채울 것은 validations 의
# **expression 과 messageExpression** 뿐 — 거기에 라벨↔SA 일관성 로직을 CEL로 쓴다.
apiVersion: admissionregistration.k8s.io/v1
kind: ValidatingAdmissionPolicy
metadata:
  name: shop-label-identity
spec:
  failurePolicy: Fail
  matchConstraints:
    resourceRules:
      - apiGroups: [""]
        apiVersions: ["v1"]
        operations: ["CREATE", "UPDATE"]
        resources: ["pods"]
  variables:
    - name: sa
      expression: "object.spec.serviceAccountName"
    - name: hasApp
      expression: "has(object.metadata.labels) && 'app' in object.metadata.labels"
    - name: app
      expression: "variables.hasApp ? object.metadata.labels['app'] : ''"
  validations:
    # TODO: app 라벨이 없으면 통과(!hasApp), 아니면 app∈{web,api,db}이고 sa가 app+'-sa'와 일치해야 통과.
    #   변수는 variables.hasApp / variables.app / variables.sa 로 참조.
    #   CEL 예: variables.app == 'web' && variables.sa == 'web-sa'
    - expression: >
        true
      # TODO: 거부 시 왜 거부됐는지 알려주는 메시지(변수 보간). 채점기는 메시지 안의
      #   'forged' 또는 'B7' 토큰으로 "내 정책이 막았다"를 RBAC 403과 구분한다 — 토큰 하나는 넣어라.
      messageExpression: >
        "TODO"
---
apiVersion: admissionregistration.k8s.io/v1
kind: ValidatingAdmissionPolicyBinding
metadata:
  name: shop-label-identity-binding
spec:
  policyName: shop-label-identity
  validationActions: ["Deny"]
  matchResources:
    namespaceSelector:
      matchLabels:
        kubernetes.io/metadata.name: shop
