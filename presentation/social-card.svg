<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 640" width="1280" height="640">
  <rect width="1280" height="640" fill="#0b0d10"/>
  <rect x="72" y="74" width="11" height="11" rx="2" fill="#34d399"/>
  <text x="95" y="84" fill="#8b9099" font-family="'JetBrains Mono',Consolas,monospace" font-size="19" font-weight="500"><tspan fill="#e7e9ee" font-weight="700">cloudsec</tspan> / verified by code &#183; Korea FSC MLS</text>
  <text x="70" y="200" fill="#e7e9ee" font-family="'Noto Sans KR','Malgun Gothic',sans-serif" font-size="60" font-weight="900">망분리를 풀면,</text>
  <text x="70" y="280" fill="#e7e9ee" font-family="'Noto Sans KR','Malgun Gothic',sans-serif" font-size="60" font-weight="900">신뢰를 무엇으로 대체하는가</text>
  <text x="72" y="332" fill="#8b9099" font-family="'Noto Sans KR','Malgun Gothic',sans-serif" font-size="24">MLS 보상통제를 코드로 &#8212; 막는다는 사실을 매번 라이브로 재현.</text>
  <g font-family="'JetBrains Mono',Consolas,monospace" font-size="22">
    <text x="72" y="424" fill="#8b9099">coverage</text>
    <rect x="210" y="410" width="220" height="7" rx="3" fill="#1b1f25"/>
    <rect x="210" y="410" width="165" height="7" rx="3" fill="#34d399"/>
    <text x="452" y="424" fill="#34d399" font-weight="700">75%</text>
    <text x="540" y="424" fill="#8b9099">30/40 검증가능-as-code</text>
    <text x="72" y="468" fill="#8b9099">verify</text>
    <rect x="210" y="454" width="220" height="7" rx="3" fill="#1b1f25"/>
    <rect x="210" y="454" width="220" height="7" rx="3" fill="#34d399"/>
    <text x="452" y="468" fill="#34d399" font-weight="700">21/21</text>
    <text x="540" y="468" fill="#8b9099">라이브 &#183; 전 계층</text>
  </g>
  <text x="72" y="528" fill="#6b748f" font-family="'JetBrains Mono',Consolas,monospace" font-size="18">cedar 8/8&#183;17/17 &#160; rebac 11/11 &#160; checkov 452/0 &#160; +1 CVE</text>
  <text x="72" y="574" fill="#8b9099" font-family="'JetBrains Mono',Consolas,monospace" font-size="20">identity <tspan fill="#3a4150">&#8594;</tspan> segmentation <tspan fill="#3a4150">&#8594;</tspan> authz <tspan fill="#3a4150">&#8594;</tspan> encrypt <tspan fill="#3a4150">&#8594;</tspan> runtime</text>
  <text x="72" y="606" fill="#6b748f" font-family="'Noto Sans KR','Malgun Gothic',sans-serif" font-size="14">교육&#183;포트폴리오 &#8212; 법률/금융 자문&#183;공식 FSC 매핑 아님</text>
  <text x="1208" y="606" fill="#4b515b" text-anchor="end" font-family="'JetBrains Mono',Consolas,monospace" font-size="18" font-weight="700">cloudsec-policy-stack</text>
